    const mainEl = document.getElementById("main-chart");
    const adxEl = document.getElementById("adx-chart");
    const detailEl = document.getElementById("k-detail");

    const mainChart = LightweightCharts.createChart(mainEl, {
      width: mainEl.clientWidth,
      height: mainEl.clientHeight,
      layout: { background: { color: "#ffffff" }, textColor: "#111827" },
      rightPriceScale: { borderVisible: true, borderColor: "#dbe2ea" },
      timeScale: { borderVisible: true, borderColor: "#dbe2ea", timeVisible: true },
      grid: { vertLines: { color: "#eef2f7" }, horzLines: { color: "#eef2f7" } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      localization: { priceFormatter: (p) => p.toFixed(6) }
    });

    const adxChart = LightweightCharts.createChart(adxEl, {
      width: adxEl.clientWidth,
      height: adxEl.clientHeight,
      layout: { background: { color: "#ffffff" }, textColor: "#111827" },
      rightPriceScale: { borderVisible: true, borderColor: "#dbe2ea" },
      timeScale: { borderVisible: true, borderColor: "#dbe2ea", timeVisible: true },
      grid: { vertLines: { color: "#eef2f7" }, horzLines: { color: "#eef2f7" } },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      localization: { priceFormatter: (p) => p.toFixed(2) }
    });

    const candleSeries = mainChart.addCandlestickSeries({
      upColor: "#d1495b",
      downColor: "#2a9d8f",
      borderVisible: true,
      borderUpColor: "#d1495b",
      borderDownColor: "#2a9d8f",
      wickUpColor: "#d1495b",
      wickDownColor: "#2a9d8f"
    });
    const ma5Series = mainChart.addLineSeries({
      color: "#f59e0b",
      lineWidth: 1.2,
      priceLineVisible: false,
      crosshairMarkerVisible: false
    });
    const ma10Series = mainChart.addLineSeries({
      color: "#1d4ed8",
      lineWidth: 1.2,
      priceLineVisible: false,
      crosshairMarkerVisible: false
    });
    const adxSeries = adxChart.addLineSeries({
      color: "#6d28d9",
      lineWidth: 1.4,
      priceLineVisible: false,
      crosshairMarkerVisible: false
    });

    candleSeries.setData(payload.candles);
    ma5Series.setData(payload.ma5);
    ma10Series.setData(payload.ma10);
    adxSeries.setData(payload.adx14);

    mainChart.timeScale().fitContent();
    adxChart.timeScale().fitContent();

    let syncingRange = false;
    mainChart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
      if (syncingRange || !range) return;
      syncingRange = true;
      adxChart.timeScale().setVisibleLogicalRange(range);
      syncingRange = false;
    });
    adxChart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
      if (syncingRange || !range) return;
      syncingRange = true;
      mainChart.timeScale().setVisibleLogicalRange(range);
      syncingRange = false;
    });

    const adxByTime = new Map(payload.adx14.map((x) => [x.time, x.value]));
    const candleByTime = new Map(payload.candles.map((x) => [x.time, x]));

    function formatTime(time) {
      if (typeof time === "string") return time;
      if (typeof time === "number") return new Date(time * 1000).toISOString().slice(0, 10);
      if (time && typeof time === "object" && "year" in time) {
        const y = String(time.year).padStart(4, "0");
        const m = String(time.month).padStart(2, "0");
        const d = String(time.day).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }
      return "";
    }

    function fmtPrice(num) {
      return Number(num).toFixed(6);
    }

    function setDetail(bar, timeValue) {
      if (!bar) return;
      const dateText = formatTime(timeValue || bar.time);
      const change = bar.close - bar.open;
      const changePct = bar.open ? (change / bar.open) * 100 : 0;
      const amplitudePct = bar.open ? ((bar.high - bar.low) / bar.open) * 100 : 0;
      const adxVal = adxByTime.get(dateText);
      const adxText = adxVal == null ? "--" : Number(adxVal).toFixed(2);
      const cls = change >= 0 ? "up" : "down";
      const sign = change >= 0 ? "+" : "";
      detailEl.innerHTML =
        `<span><span class="label">日期</span>${dateText}</span>` +
        `<span><span class="label">开</span>${fmtPrice(bar.open)}</span>` +
        `<span><span class="label">高</span>${fmtPrice(bar.high)}</span>` +
        `<span><span class="label">低</span>${fmtPrice(bar.low)}</span>` +
        `<span><span class="label">收</span>${fmtPrice(bar.close)}</span>` +
        `<span class="${cls}"><span class="label">涨跌</span>${sign}${fmtPrice(change)}</span>` +
        `<span class="${cls}"><span class="label">涨跌幅</span>${sign}${changePct.toFixed(2)}%</span>` +
        `<span><span class="label">振幅</span>${amplitudePct.toFixed(2)}%</span>` +
        `<span><span class="label">ADX14</span>${adxText}</span>`;
    }

    const latestBar = payload.candles[payload.candles.length - 1];
    setDetail(latestBar, latestBar ? latestBar.time : "");

    mainChart.subscribeCrosshairMove((param) => {
      const point = param && param.seriesData ? param.seriesData.get(candleSeries) : null;
      if (point && point.open != null && point.high != null && point.low != null && point.close != null) {
        setDetail(point, param.time);
      } else {
        setDetail(latestBar, latestBar ? latestBar.time : "");
      }
    });

    adxChart.subscribeCrosshairMove((param) => {
      if (!param || !param.time) {
        setDetail(latestBar, latestBar ? latestBar.time : "");
        return;
      }
      const t = formatTime(param.time);
      const c = candleByTime.get(t);
      if (c) setDetail(c, param.time);
    });

    const rangeButtons = Array.from(document.querySelectorAll("button[data-range]"));
    rangeButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const v = btn.getAttribute("data-range");
        if (v === "all") {
          mainChart.timeScale().fitContent();
          adxChart.timeScale().fitContent();
          return;
        }
        const n = Number(v);
        const total = payload.candles.length;
        if (!Number.isFinite(n) || total === 0) return;
        const range = { from: Math.max(0, total - n) - 1, to: total + 2 };
        mainChart.timeScale().setVisibleLogicalRange(range);
        adxChart.timeScale().setVisibleLogicalRange(range);
      });
    });

    window.addEventListener("resize", () => {
      mainChart.applyOptions({ width: mainEl.clientWidth, height: mainEl.clientHeight });
      adxChart.applyOptions({ width: adxEl.clientWidth, height: adxEl.clientHeight });
    });
  </script>
